<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Churn Prediction</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container{
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }

        h1{
            text-align: center;
            color: #333;
        }

        input{
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button{
            width: 100%;
            padding: 12px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover{
            background-color: #0056b3;
        }

        .result{
            margin-top: 20px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: green;
        }

    </style>
</head>

<body>

    <div class="container">

        <h1>Customer Churn Prediction</h1>

        <form action="/predict" method="POST">

            <label>Tenure</label>
            <input type="number" step="any" name="tenure" required>

            <label>Monthly Charges</label>
            <input type="number" step="any" name="monthly_charges" required>

            <label>Total Charges</label>
            <input type="number" step="any" name="total_charges" required>

            <button type="submit">Predict</button>

        </form>

        <div class="result">
            {{ prediction_text }}
        </div>

    </div>

</body>
</html>
